services:
  mysql:
    extends:
      file: docker-compose.base.yml
      service: mysql

  addons-sync:
    extends:
      file: docker-compose.base.yml
      service: addons-sync

  migrate:
    extends:
      file: docker-compose.base.yml
      service: migrate

  redmine:
    extends:
      file: docker-compose.base.yml
      service: redmine

  active-jobs:
    extends:
      file: docker-compose.base.yml
      service: active-jobs

  memcached:
    extends:
      file: docker-compose.base.yml
      service: memcached

  postfix:
    extends:
      file: docker-compose.base.yml
      service: postfix

  hub:
    extends:
      file: docker-compose.base.yml
      service: hub

volumes:
  taskman_test_db_mysql84:
    driver: local
  addons_data:
    driver: local
  redmine_assets:
    driver: local
  redmine_files:
    driver: local
