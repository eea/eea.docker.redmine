services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: redmine_test
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: redmine
      TZ: Europe/Copenhagen
    volumes:
    - taskman_test_db:/var/lib/mysql
    command:
    - --query-cache-size=0
    - --query-cache-limit=64M
    - --query-cache-type=0
    - --innodb-buffer-pool-size=1G
    - --innodb-buffer-pool-instances=4
    - --net-read-timeout=7200
    - --net-write-timeout=7200
    - --max-allowed-packet=128M
    - --tmp-table-size=384M
    - --max-heap-table-size=384M
    - --join-buffer-size=256M
    - --character_set_server=utf8mb4

  redmine:
    image: test-redmine:latest
    build:
      context: ../.
      args:
        PLUGINS_URL: https://cmshare.eea.europa.eu/remote.php/dav/files/${REDMINE_PLUGINS_USER:-}/redmine6-files/plugins
        PLUGINS_USER: ${REDMINE_PLUGINS_USER:-}
        PLUGINS_PASSWORD: ${REDMINE_PLUGINS_PASSWORD:-}
        A1_THEME_URL: ${A1_THEME_URL:-}
        A1_THEME_USER: ${A1_THEME_USER:-${REDMINE_PLUGINS_USER:-}}
        A1_THEME_PASSWORD: ${A1_THEME_PASSWORD:-${REDMINE_PLUGINS_PASSWORD:-}}
        A1_THEME_SHA256: ${A1_THEME_SHA256:-}
        REQUIRE_PRO_PLUGINS: ${REQUIRE_PRO_PLUGINS:-1}
        REQUIRE_A1_THEME: ${REQUIRE_A1_THEME:-1}
    environment:
      PLUGINS_PASSWORD: ${REDMINE_PLUGINS_PASSWORD:-}
      PLUGINS_URL: https://cmshare.eea.europa.eu/remote.php/dav/files/${REDMINE_PLUGINS_USER:-}/redmine6-files/plugins
      SELENIUM_REMOTE_URL: http://hub:4444/wd/hub
      PLUGINS_USER: ${REDMINE_PLUGINS_USER:-}
      REDIS_URL: redis://redis:6379/0
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-async}
      RAILS_PULSE_AUTH_ENABLED: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      REDMINE_HOST: redmine:3000
      RAILS_ENV: test
      TZ: Europe/Copenhagen
    entrypoint:
    - tail
    - -f
    - /dev/null
    volumes:
    - redmine_files:/usr/src/redmine/test/fixtures/files  
    depends_on:
    - mysql  
    - redis
    links:
    - mysql:mysql

  active-jobs:
    image: test-redmine:latest
    environment:
      PLUGINS_URL: https://cmshare.eea.europa.eu/remote.php/dav/files/${REDMINE_PLUGINS_USER:-}/redmine6-files/plugins
      PLUGINS_USER: ${REDMINE_PLUGINS_USER:-}
      PLUGINS_PASSWORD: ${REDMINE_PLUGINS_PASSWORD:-}
      REDIS_URL: redis://redis:6379/0
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-async}
      RAILS_PULSE_AUTH_ENABLED: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      REDMINE_DB_MYSQL: mysql
      REDMINE_DB_DATABASE: redmine_test
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: password
      REDMINE_PLUGINS_MIGRATE: "no"
      ADMIN_BOOTSTRAP_ENABLE: "0"
      START_SERVER: "0"
      START_CRON: "1"
      REDMINE_HOST: redmine:3000
      RAILS_ENV: production
      TZ: Europe/Copenhagen
    volumes:
    - redmine_files:/usr/src/redmine/test/fixtures/files
    depends_on:
    - mysql
    - redis
    links:
    - mysql:mysql

  memcached:
    # Avoid the ambiguous/nonexistent "memcached:1" tag in clean CI environments.
    image: memcached:1.6
    environment:
      TZ: Europe/Copenhagen
    command:
    - -m
    - '512'

  redis:
    image: redis:7-alpine
    environment:
      TZ: Europe/Copenhagen

  postfix:
    image: eaudeweb/mailtrap:latest

  hub:
    image: selenium/standalone-chrome:4.0
    shm_size: 2g
    depends_on:
    - redmine
    volumes:
      - redmine_files:/usr/src/redmine/test/fixtures/files
  
volumes:
  taskman_test_db:
    driver: local
  redmine_files:
    driver: local  
