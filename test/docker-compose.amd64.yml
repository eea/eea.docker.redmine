services:
  mysql:
    platform: linux/amd64
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: redmine_test
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: redmine
      TZ: Europe/Copenhagen
    volumes:
    - taskman_test_db_mysql84:/var/lib/mysql
    command:
    - --innodb-buffer-pool-size=1G
    - --innodb-buffer-pool-instances=4
    - --innodb-redo-log-capacity=2G
    - --net-read-timeout=7200
    - --net-write-timeout=7200
    - --max-allowed-packet=128M
    - --tmp-table-size=384M
    - --max-heap-table-size=384M
    - --join-buffer-size=256M
    - --character_set_server=utf8mb4
    - --collation_server=utf8mb4_0900_ai_ci

  redmine:
    platform: linux/amd64
    image: test-redmine:latest
    build:
      context: ../.
      args:
        PLUGINS_URL: ${PLUGINS_URL:-}
        PLUGINS_USER: ${PLUGINS_USER:-}
        PLUGINS_PASSWORD: ${PLUGINS_PASSWORD:-}
        A1_THEME_URL: ${A1_THEME_URL:-}
        A1_THEME_USER: ${A1_THEME_USER:-${PLUGINS_USER:-}}
        A1_THEME_PASSWORD: ${A1_THEME_PASSWORD:-${PLUGINS_PASSWORD:-}}
        A1_THEME_SHA256: ${A1_THEME_SHA256:-}
    environment:
      # Optional RedmineUP plugin zips download (leave empty to skip)
      PLUGINS_URL: ${PLUGINS_URL:-}
      PLUGINS_USER: ${PLUGINS_USER:-}
      PLUGINS_PASSWORD: ${PLUGINS_PASSWORD:-}
      REDMINE_DB_MYSQL: mysql
      REDMINE_DB_DATABASE: redmine_test
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: password
      REDMINE_PLUGINS_MIGRATE: "yes"
      # Start Rails server from /start_redmine.sh (for local interactive runs)
      START_SERVER: "1"
      START_CRON: "0"
      FAST_BOOT: ${FAST_BOOT:-1}
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-async}
      RAILS_PULSE_AUTH_ENABLED: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      SELENIUM_REMOTE_URL: http://hub:4444/wd/hub
      REDMINE_HOST: redmine:3000
      RAILS_ENV: production
      RAILS_LOG_LEVEL: info
      MEMCACHE_SERVERS: memcached:11211
      MEMCACHE_NAMESPACE: redmine-prod
      MEMCACHE_EXPIRES_IN: "3600"
      REDIS_URL: redis://redis:6379/0
      RAILS_SERVE_STATIC_FILES: "1"
      AGILE_BOARD_PROFILE: ${AGILE_BOARD_PROFILE:-0}
      TZ: Europe/Copenhagen
    ports:
    - "3000:3000"
    volumes:
    - redmine_files:/usr/src/redmine/test/fixtures/files
    - ../.local-artifacts/redmineup/plugins:/install_plugins
    - ../.local-artifacts/redmineup/themes:/install_themes:ro
    depends_on:
    - mysql
    - redis
    links:
    - mysql:mysql

  active-jobs:
    platform: linux/amd64
    image: test-redmine:latest
    environment:
      PLUGINS_URL: ${PLUGINS_URL:-}
      PLUGINS_USER: ${PLUGINS_USER:-}
      PLUGINS_PASSWORD: ${PLUGINS_PASSWORD:-}
      REDMINE_DB_MYSQL: mysql
      REDMINE_DB_DATABASE: redmine_test
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: password
      REDMINE_PLUGINS_MIGRATE: "no"
      ADMIN_BOOTSTRAP_ENABLE: "0"
      START_SERVER: "0"
      START_CRON: "1"
      FAST_BOOT: ${FAST_BOOT:-1}
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-async}
      RAILS_PULSE_AUTH_ENABLED: "0"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      REDMINE_HOST: redmine:3000
      RAILS_ENV: production
      RAILS_LOG_LEVEL: info
      MEMCACHE_SERVERS: memcached:11211
      MEMCACHE_NAMESPACE: redmine-prod
      MEMCACHE_EXPIRES_IN: "3600"
      REDIS_URL: redis://redis:6379/0
      RAILS_SERVE_STATIC_FILES: "1"
      TZ: Europe/Copenhagen
    volumes:
    - redmine_files:/usr/src/redmine/test/fixtures/files
    - ../.local-artifacts/redmineup/plugins:/install_plugins
    - ../.local-artifacts/redmineup/themes:/install_themes:ro
    depends_on:
    - mysql
    - redis
    links:
    - mysql:mysql

  memcached:
    platform: linux/amd64
    image: memcached:1.6
    environment:
      TZ: Europe/Copenhagen
    command:
    - -m
    - '512'

  redis:
    platform: linux/amd64
    image: redis:7-alpine
    environment:
      TZ: Europe/Copenhagen

  postfix:
    platform: linux/amd64
    image: eaudeweb/mailtrap:latest

  hub:
    platform: linux/amd64
    image: selenium/standalone-chrome:4.0
    shm_size: 2g
    depends_on:
    - redmine
    volumes:
      - redmine_files:/usr/src/redmine/test/fixtures/files

volumes:
  taskman_test_db_mysql84:
    driver: local
  redmine_files:
    driver: local
